# @package _global_

defaults:
  - override /hydra/sweeper: optuna

optimized_metric: score

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    storage: null
    study_name: null
    n_jobs: 1
    direction: maximize
    n_trials: 8
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 2
    params:
      method.max_new_tokens: choice(8,16,32)
      method.temperature: choice(0.0,0.2,0.7)
