name: "uv-mirror-env"
display_name: "uv Mirror Env"
short_description: "Stop and fix Python env blockers with uv."
default_prompt: "When Python code, tests, or scripts fail from ModuleNotFoundError, ImportError, uv/pip resolver errors, broken .venv activation, wrong interpreter, version conflicts, CUDA/Torch ABI mismatches, build failures, or missing wheels, immediately switch to $uv-mirror-env before continuing. Repair locally with a uv-managed .venv, no proxy, domestic PyPI mirrors, cache-first large dependency installs, and Docker wheel builds for fragile CUDA deps; ask the user only if local recovery is exhausted or unsafe, then rerun the original command."
