name: uv-mirror-env
display_name: uv Mirror Env
short_description: Fix Python dependency blockers with uv, cache-first installs, and domestic mirrors.
default_prompt: When Python code, tests, or scripts fail from ModuleNotFoundError, ImportError, uv/pip resolver errors, broken .venv activation, version conflicts, CUDA/Torch ABI mismatches, build failures, or missing wheels, switch to this skill first. Repair the uv-managed .venv with no proxy, domestic PyPI mirrors, cache-first installs for large packages, and Docker wheel builds for fragile CUDA deps; validate with targeted imports and uv pip check before rerunning the original command.
